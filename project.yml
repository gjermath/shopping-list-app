name: ShoppingList
options:
  bundleIdPrefix: com.gjermath
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  ShoppingList:
    type: application
    platform: iOS
    sources:
      - ShoppingList
    settings:
      base:
        INFOPLIST_FILE: ShoppingList/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gjermath.shoppinglist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ShoppingList/ShoppingList.entitlements
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseFunctions
      - package: FirebaseSDK
        product: FirebaseStorage
      - package: FirebaseSDK
        product: FirebaseMessaging
      # - target: ShoppingListWidget  # Temporarily disabled — simulator WidgetKit bug
      #   embed: true
    entitlements:
      path: ShoppingList/ShoppingList.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development

  ShoppingListTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ShoppingListTests
    dependencies:
      - target: ShoppingList
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  ShoppingListUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ShoppingListUITests
    dependencies:
      - target: ShoppingList
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  ShoppingListWidget:
    type: app-extension
    platform: iOS
    sources:
      - ShoppingListWidget
    settings:
      base:
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ShoppingListWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gjermath.shoppinglist.widget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
